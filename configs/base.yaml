project:
  name: stroke-risk-xgb-shap

paths:
  data_csv: healthcare-dataset-stroke-data.csv
  artifacts_dir: artifacts

data:
  target_col: stroke
  id_cols:
    - id
  drop_cols: []
  test_size: 0.20
  val_size: 0.15
  random_state: 42

preprocess:
  clip_lower_quantile: 0.01
  clip_upper_quantile: 0.99
  iterative_imputer_max_iter: 20 # MICE iterations for numeric features (bmi)
  cat_iterative_imputer_max_iter: 10 # MICE iterations for categorical features

model:
  objective_metric: pr_auc # best ranking quality on this dataset after CV tuning
  objective_top_pct: 0.55 # used only when objective_metric needs top-K inputs
  objective_pr_auc_weight: 0.40 # used only for tiering_score objective
  sampler_strategy: borderline_smote # best recall/PR trade-off — SMOTE-Tomek experiment  showed Recall drop to 90%
  baseline_threshold: 0.20
  cv_threshold: 0.20
  xgb_default_params:
    n_estimators: 400
    max_depth: 4
    learning_rate: 0.05
    min_child_weight: 2.0
    subsample: 0.9
    colsample_bytree: 0.9
    gamma: 0.0
    reg_alpha: 0.0
    reg_lambda: 1.0
    scale_pos_weight: 19 # approx. neg/pos ratio (~95%/5%) to penalise missing stroke

cv:
  n_splits: 5

optuna:
  n_trials: 150
  timeout_seconds: null

threshold:
  strategy: recall_100
  min_precision: 0.20
  safety_margin: 0.30

risk_stratification:
  mode: fixed_probability # Absolute probability cut-offs — patient-independent
  critical_min_prob: 0.30 # >= 30%: Emergency — CT/MRI within 30 minutes
  high_min_prob: 0.15 # >= 15%: Specialist review within 48h
  moderate_min_prob: 0.05 # >=  5%: Above population prevalence (~4.8%), monitor 3-6 months
  # low: anything below stage1_threshold (auto-set by recall_100 strategy)

shap:
  max_background_samples: 300
  max_explain_samples: 500
